<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Misha Bakehouse | Kukis & Cake Terbaik di Kota Metro</title>

    <meta name="description"
        content="Kukis dan kue premium yang dipanggang segar setiap hari di Kota Metro. Rasakan kelezatan dalam setiap gigitan.">
    <meta name="google-site-verification" content="zun3rgELJF3QamAlbYlVzpNS594JuSzOvGZ0zloGDks" />

    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function (OneSignal) {
            await OneSignal.init({
                appId: "5915e37b-4344-4f12-b442-067ced458d88",
                notifyButton: { enable: false },
                promptOptions: {
                    slidedown: {
                        enabled: true,
                        autoPrompt: true,
                        timeDelay: 10,
                        pageViews: 1
                    }
                }
            });

            // Custom UI logic for Subscription Bell
            updateBellUI(OneSignal);

            // Listen for changes
            OneSignal.Notifications.addEventListener("permissionChange", () => updateBellUI(OneSignal));
        });

        function updateBellUI(OneSignal) {
            const isSubscribed = OneSignal.Notifications.permission;
            let bell = document.getElementById('custom-one-signal-bell');
            
            if (!bell) {
                bell = document.createElement('div');
                bell.id = 'custom-one-signal-bell';
                bell.className = 'bell-floating-icon';
                bell.innerHTML = '<div class="bell-hint" id="bell-hint">Berlangganan Promo & Diskon</div><i class="fa-solid fa-bell"></i>';
                bell.onclick = function() {
                    console.log("Mencoba memicu langganan...");
                    OneSignal.Notifications.requestPermission().then((res) => {
                        console.log("Hasil request:", res);
                    }).catch(err => {
                        console.error("Gagal:", err);
                    });
                };
                document.body.appendChild(bell);

                // Auto-hide hint
                setTimeout(() => {
                    const hint = document.getElementById('bell-hint');
                    if (hint) hint.style.opacity = '0';
                }, 7000);
            }

            // UNTUK TESTING: Kita paksa bel tetap muncul (active) agar Anda bisa klik
            bell.classList.add('active');
            
            /* 
            // Logika asli untuk menyembunyikan jika sudah subscribe:
            if (isSubscribed) {
                bell.classList.remove('active');
            } else {
                bell.classList.add('active');
            }
            */
        }
    </script>
    <style>
        /* Sembunyikan paksa notify button/bell dari OneSignal jika masih muncul */
        #onesignal-bell-container,
        .onesignal-bell-launcher,
        .onesignal-bell-launcher-button {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
