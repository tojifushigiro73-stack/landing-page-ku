<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | La Misha Bakehouse</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #fdf2f6; padding: 20px; }
        .admin-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 32px; box-shadow: var(--shadow); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #fdf2f6; padding-bottom: 20px; }
        .admin-title { font-family: 'Playfair Display', serif; color: var(--primary); font-size: 1.8rem; }
        .member-card { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 20px; border: 1px solid #f0f0f0; margin-bottom: 15px; transition: 0.3s; }
        .member-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .member-info { flex: 1; }
        .member-name { font-weight: 700; color: var(--text-dark); font-size: 1.1rem; }
        .member-email { font-size: 0.85rem; color: var(--text-muted); }
        .member-points { background: var(--primary); color: white; padding: 8px 15px; border-radius: 50px; font-weight: 700; font-size: 0.9rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 20px; border-radius: 24px; text-align: center; border: 1px solid #fdf2f6; }
        .stat-val { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        #auth-check { text-align: center; padding: 50px; }
    </style>
</head>
<body>

    <div id="auth-check">
        <h2 class="admin-title">Memeriksa Akses Admin...</h2>
        <p>Silakan login untuk mengakses data member.</p>
        <button class="cta-btn" style="border:none; margin-top:20px" onclick="window.location.href='index.html'">Kembali ke Toko</button>
    </div>

    <div class="admin-container" id="admin-content" style="display: none;">
        <header class="admin-header">
            <h1 class="admin-title">Member La Misha</h1>
            <button class="user-nav-btn" onclick="window.location.href='index.html'">
                <i class="fa-solid fa-store"></i> Ke Toko
            </button>
        </header>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-val" id="total-members">0</div>
                <div class="stat-label">Total Member</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="total-points">0</div>
                <div class="stat-label">Total Poin Beredar</div>
            </div>
        </div>

        <div id="member-list">
            <!-- Data Member akan muncul di sini -->
            <p style="text-align:center; color:#999">Memuat data pelanggan...</p>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
